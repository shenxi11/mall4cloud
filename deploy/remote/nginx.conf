# 模块名: remote_nginx_gateway
# 功能概述: 远程部署统一入口，承载三个前端和后端 API 反向代理。
# 对外接口: http://<server>:6688/
# 依赖关系: gateway 8000, MinIO 9000, 前端 dist 目录
# 输入输出: 输入 HTTP 请求，输出静态资源或代理后的后端响应。
# 异常与错误: 上游服务不可用时返回 502，由容器日志定位。
# 维护说明: 仅开放 6688 时，所有公网访问都应走本配置。

server {
    listen 6688;
    server_name _;
    client_max_body_size 100m;

    location = / {
        return 302 /platform/;
    }

    location = /platform {
        return 301 /platform/;
    }

    location /platform/ {
        alias /workspace/front-end/mall4cloud-platform/dist/;
        try_files $uri $uri/ /platform/index.html;
        index index.html;
    }

    location = /multishop {
        return 301 /multishop/;
    }

    location /multishop/ {
        alias /workspace/front-end/mall4cloud-multishop/dist/;
        try_files $uri $uri/ /multishop/index.html;
        index index.html;
    }

    location = /cloud {
        return 301 /cloud/;
    }

    location /cloud/ {
        alias /workspace/front-end/mall4cloud-uniapp/dist/build/h5/;
        try_files $uri $uri/ /cloud/index.html;
        index index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    location /api/ {
        proxy_pass http://mall4cloud-gateway:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
    }

    location /minio/ {
        proxy_pass http://mall4cloud-minio:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /minio-console {
        return 301 /minio-console/;
    }

    location /minio-console/ {
        proxy_pass http://mall4cloud-minio:9001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /nacos/ {
        proxy_pass http://mall4cloud-nacos:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
